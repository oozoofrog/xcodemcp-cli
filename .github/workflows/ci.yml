name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Resolve dependencies
        run: swift package resolve

      - name: Check version sync
        run: bash ./scripts/check-version-sync.sh

      - name: Run Go tests
        run: go test ./...

      - name: Go build smoke test
        run: |
          mkdir -p .tmp
          go build -o .tmp/xcodecli-go ./cmd/xcodecli
          .tmp/xcodecli-go version

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test

      - name: Release build
        run: ./scripts/build-swift.sh .tmp/xcodecli

      - name: Verify version output
        run: .tmp/xcodecli version
