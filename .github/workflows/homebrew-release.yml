name: Homebrew Release to Shared Tap

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish to Homebrew (for example v0.3.0)
        required: true
        type: string

jobs:
  update-shared-homebrew-tap:
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve release tag
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          release_tag="${{ github.event.release.tag_name || inputs.release_tag }}"
          if [[ -z "$release_tag" ]]; then
            echo "release tag is required" >&2
            exit 1
          fi
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Ensure tap token is configured
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${HOMEBREW_TAP_GITHUB_TOKEN:-}" ]]; then
            echo "HOMEBREW_TAP_GITHUB_TOKEN is required" >&2
            exit 1
          fi

      - name: Update shared Homebrew tap
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/release_homebrew.sh "${{ steps.vars.outputs.release_tag }}" --push
